name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 (for sdkmanager) and JDK 8 (for Gradle build)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            17
            8

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}

      - name: Install old SDK platform & build-tools
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
        run: |
          sdkmanager "platforms;android-26" "build-tools;26.0.1" "platform-tools"

      - name: Patch repositories (jcenter is dead)
        working-directory: SWFDecompiler
        run: |
          sed -i "s#jcenter()#maven { url 'https://jcenter.bintray.com' }\n        google()#g" build.gradle

      - name: Set up Gradle 2.14.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 2.14.1

      - name: Run build
        working-directory: SWFDecompiler
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_8_X64 }}
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: SWFDecompiler/app/build/outputs/apk/**/*.apk
          
